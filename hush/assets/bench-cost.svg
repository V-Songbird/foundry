<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" font-family="Segoe UI,-apple-system,Helvetica,Arial,sans-serif">
  <text x="8" y="24" font-size="15" font-weight="600" fill="#8b949e">How much a whole session costs — vs plain Claude Code</text>
  <line x1="340" y1="64" x2="340" y2="172" stroke="#8b949e" stroke-width="1.5" opacity="0.5"/>
  <text x="340" y="56" text-anchor="middle" font-size="11" fill="#8b949e">no plugin</text>
  <rect x="340" y="80" width="60" height="30" rx="3" fill="#e0653f"/>
  <text x="330" y="100" text-anchor="end" font-size="12.5" fill="#8b949e">Popular "be brief" plugin</text>
  <text x="408" y="100" font-size="12.5" font-weight="600" fill="#e0653f">+3% — costs you more</text>
  <rect x="160" y="126" width="180" height="30" rx="3" fill="#16a34a"/>
  <text x="350" y="146" font-size="13" font-weight="700" fill="#16a34a">hush</text>
  <text x="152" y="146" text-anchor="end" font-size="12.5" font-weight="600" fill="#16a34a">9% cheaper</text>
  <text x="8" y="192" font-size="11" fill="#8b949e">← cheaper</text>
  <text x="672" y="192" text-anchor="end" font-size="11" fill="#8b949e">costs more →</text>
</svg>
